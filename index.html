<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Hala </title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0a0700;
    --bg2:    #110e04;
    --bg3:    #1a1508;
    --accent: #c9a84c;
    --accent2:#f0c96e;
    --gold:   #f0c96e;
    --gold2:  #c9a84c;
    --text:   #f5e6c8;
    --text2:  #a89060;
    --card:   #14110400;
    --border: rgba(201,168,76,0.2);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* بخار ذهبي خلفي */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 100%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  /* ===== NAV ===== */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,7,0,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 1000;
  }

  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Tajawal', sans-serif;
    font-size: 11px;
    cursor: pointer;
    padding: 6px 16px;
    border-radius: 10px;
    transition: all 0.25s;
  }

  .nav-btn.active { color: var(--gold); }
  .nav-btn.active svg { filter: drop-shadow(0 0 6px rgba(240,201,110,0.5)); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(180deg, rgba(201,168,76,0.1) 0%, transparent 100%);
    padding: 50px 16px 20px;
    position: relative;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.6;
  }

  .app-logo {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold2), var(--gold), #8b6420);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.3));
  }

  .app-tagline {
    font-size: 13px;
    color: var(--text2);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* ===== SEARCH BAR ===== */
  .search-container {
    padding: 12px 16px;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 13px 16px 13px 44px;
    background: rgba(26,21,8,0.8);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 50px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
  }

  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }
  .search-input::placeholder { color: var(--text2); }

  .search-icon {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    width: 18px;
    height: 18px;
  }

  /* ===== SECTION TITLES ===== */
  .section-title {
    font-size: 17px;
    font-weight: 700;
    padding: 16px 16px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-title::before {
    content: '';
    width: 4px;
    height: 18px;
    background: linear-gradient(180deg, var(--gold2), var(--gold2));
    border-radius: 2px;
    display: block;
    flex-shrink: 0;
    -webkit-text-fill-color: unset;
  }

  /* ===== ANIME CARDS - HORIZONTAL ===== */
  .cards-scroll {
    display: flex;
    gap: 12px;
    padding: 0 16px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .cards-scroll::-webkit-scrollbar { display: none; }

  .anime-card {
    flex-shrink: 0;
    width: 130px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.23,1,0.32,1);
  }
  .anime-card:active { transform: scale(0.95); }

  .anime-card img {
    width: 130px;
    height: 185px;
    object-fit: cover;
    border-radius: var(--radius);
    border: 1px solid rgba(201,168,76,0.15);
    background: var(--bg3);
    transition: border-color 0.3s;
  }
  .anime-card:hover img { border-color: rgba(201,168,76,0.4); }

  .anime-card-title {
    font-size: 12px;
    font-weight: 600;
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
    color: var(--text);
  }

  .anime-card-score {
    font-size: 11px;
    color: var(--gold);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* ===== ANIME CARDS - GRID ===== */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 0 16px 100px;
  }

  .anime-card-grid {
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.23,1,0.32,1);
  }
  .anime-card-grid:active { transform: scale(0.95); }

  .anime-card-grid img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid rgba(201,168,76,0.15);
    background: var(--bg3);
  }

  .anime-card-grid-title {
    font-size: 11px;
    font-weight: 600;
    margin-top: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
    color: var(--text);
  }

  /* ===== FEATURED BANNER ===== */
  .featured-banner {
    margin: 0 16px 8px;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    height: 200px;
    cursor: pointer;
    border: 1px solid rgba(201,168,76,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.05);
    transition: box-shadow 0.3s;
  }
  .featured-banner:hover {
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 20px rgba(201,168,76,0.1);
  }

  .featured-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .featured-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(5,4,1,0.95) 0%, rgba(5,4,1,0.2) 60%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 16px;
  }

  .featured-badge {
    background: linear-gradient(135deg, var(--gold2), #8b6420);
    color: #000;
    font-size: 10px;
    font-weight: 900;
    padding: 3px 10px;
    border-radius: 20px;
    width: fit-content;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .featured-title {
    font-size: 20px;
    font-weight: 900;
    line-height: 1.2;
    color: var(--text);
  }

  .featured-meta {
    font-size: 12px;
    color: var(--gold);
    margin-top: 4px;
  }

  /* ===== DETAIL SCREEN ===== */
  #detail-screen {
    padding-bottom: 100px;
  }

  .detail-hero {
    position: relative;
    height: 280px;
  }

  .detail-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .detail-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,7,0,0.3) 0%, var(--bg) 100%);
  }

  .back-btn {
    position: absolute;
    top: 50px;
    right: 16px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    width: 38px; height: 38px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  .back-btn:active { background: rgba(201,168,76,0.25); transform: scale(0.92); }

  .detail-content {
    padding: 0 16px;
    margin-top: -40px;
    position: relative;
  }

  .detail-poster-row {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    margin-bottom: 14px;
  }

  .detail-poster {
    width: 100px;
    height: 145px;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid rgba(201,168,76,0.35);
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
  }

  .detail-info { flex: 1; }

  .detail-title {
    font-size: 18px;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .detail-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }

  .badge {
    background: rgba(26,21,8,0.9);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--text2);
  }

  .badge.accent {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }

  .score-big {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
  }

  .watch-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold2), var(--gold), #8b6420);
    color: #000;
    border: none;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }
  .watch-btn:active { transform: scale(0.97); }
  .watch-btn:hover { box-shadow: 0 10px 30px rgba(201,168,76,0.3); }

  .fav-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--text2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.25s;
  }
  .fav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

  .synopsis {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text2);
    margin-bottom: 16px;
  }

  /* ===== EPISODES ===== */
  .episodes-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .episode-item {
    background: rgba(26,21,8,0.7);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .episode-item:active { background: rgba(201,168,76,0.08); }
  .episode-item.watched { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.05); }

  .ep-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    min-width: 30px;
  }

  .ep-title {
    font-size: 14px;
    flex: 1;
    color: var(--text);
  }

  .ep-check {
    color: var(--gold);
    font-size: 16px;
  }

  /* ===== PLAYER SCREEN ===== */
  #player-screen {
    background: #000;
    display: none;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    position: fixed;
    inset: 0;
    z-index: 500;
  }
  #player-screen.active {
    display: flex;
  }

  .player-header {
    padding: 44px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(5,4,1,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
    z-index: 100;
  }

  .player-back {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold);
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: 0.2s;
  }
  .player-back:active { background: rgba(201,168,76,0.2); }

  .player-title {
    font-size: 14px;
    font-weight: 700;
    color: white;
  }

  .webview-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  #anime-webview {
    width: 100%;
    height: 100%;
    border: none;
    background: #111;
  }

  .source-bar {
    flex-shrink: 0;
    background: rgba(5,4,1,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(201,168,76,0.15);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .source-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.25);
    background: rgba(26,21,8,0.9);
    color: var(--text2);
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .source-btn.active {
    background: linear-gradient(135deg, var(--gold2), #8b6420);
    border-color: var(--gold);
    color: #000;
    font-weight: 700;
  }

  /* ===== FAVORITES ===== */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
    gap: 12px;
    color: var(--text2);
  }

  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 15px; }

  /* ===== LOADING ===== */
  .loading {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
    gap: 8px;
  }

  .dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 0.8s infinite;
    opacity: 0.7;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== SEARCH SCREEN ===== */
  .search-results {
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .search-result-item {
    display: flex;
    gap: 12px;
    background: rgba(26,21,8,0.8);
    border-radius: 14px;
    padding: 10px;
    cursor: pointer;
    border: 1px solid rgba(201,168,76,0.12);
    transition: all 0.25s;
  }
  .search-result-item:active { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.3); }

  .search-result-item img {
    width: 65px;
    height: 90px;
    object-fit: cover;
    border-radius: 8px;
    background: var(--bg3);
    flex-shrink: 0;
  }

  .search-result-info { flex: 1; }
  .search-result-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .search-result-meta { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* ===== SCROLL PADDING ===== */
  .pb-nav { padding-bottom: 100px; }

  /* ===== GENRE TAG ===== */
  .genres-scroll {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .genre-tag {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(26,21,8,0.8);
    color: var(--text2);
  }
  .genre-tag.active {
    background: linear-gradient(135deg, var(--gold2), #8b6420);
    border-color: var(--gold);
    color: #000;
    font-weight: 700;
  }

  /* scrollable content above fixed nav */
  .scroll-content { overflow-y: auto; height: 100vh; }
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="home-screen" class="screen active">
  <div class="scroll-content">
    <div class="header">
      <div class="app-logo"> Hala</div>
      <div class="app-tagline"></div>
    </div>

    <div class="search-container">
      <input class="search-input" id="home-search" type="text" placeholder="ابحث عن أنمي..." oninput="onHomeSearch(this.value)" onclick="goToSearch()">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>

    <!-- Featured -->
    <div id="featured-banner" class="featured-banner" onclick="">
      <img id="featured-img" src="" alt="">
      <div class="featured-overlay">
        <div class="featured-badge">🔥 الأكثر مشاهدة</div>
        <div class="featured-title" id="featured-title">جاري التحميل...</div>
        <div class="featured-meta" id="featured-meta"></div>
      </div>
    </div>

    <!-- Trending -->
    <div class="section-title">🔥 الرائج الآن</div>
    <div class="cards-scroll" id="trending-cards">
      <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <!-- Top Airing -->
    <div class="section-title">📡 يُعرض الآن</div>
    <div class="cards-scroll" id="airing-cards">
      <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <!-- Top Rated -->
    <div class="section-title">⭐ الأعلى تقييماً</div>
    <div class="cards-scroll" id="toprated-cards">
      <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div style="height:80px"></div>
  </div>
</div>

<!-- ===== SEARCH SCREEN ===== -->
<div id="search-screen" class="screen">
  <div class="scroll-content">
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="goHome()" style="background:none;border:none;color:var(--text);cursor:pointer">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <span style="font-size:18px;font-weight:700">البحث</span>
      </div>
    </div>

    <div class="search-container">
      <input class="search-input" id="main-search" type="text" placeholder="ابحث عن أنمي..." oninput="searchAnime(this.value)">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>

    <div id="search-results" class="search-results">
      <div style="text-align:center;color:var(--text2);padding:40px 16px">
        <div style="font-size:40px;margin-bottom:12px">🔍</div>
        <p>ابحث عن أنمي تريده</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== FAVORITES SCREEN ===== -->
<div id="favorites-screen" class="screen">
  <div class="scroll-content">
    <div class="header">
      <div class="app-logo" style="font-size:22px">❤️ المفضلة</div>
    </div>
    <div id="favorites-list" style="padding:0 16px 100px"></div>
  </div>
</div>

<!-- ===== PLAYER SCREEN ===== -->
<div id="player-screen" class="screen">
  <div class="player-header">
    <button class="player-back" onclick="closePlayer()">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div style="flex:1;min-width:0">
      <div class="player-title" id="player-anime-title"></div>
      <div style="font-size:12px;color:var(--gold);opacity:0.8" id="player-ep-label"></div>
    </div>
  </div>

  <div class="webview-container">
    <div id="player-frame-wrap" style="width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;position:absolute;inset:0;">
      <div style="color:#c9a84c;font-family:Tajawal;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">🎌</div>
        <p>اختر أنمي للمشاهدة</p>
      </div>
    </div>
  </div>

  <div class="source-bar">
    <button class="source-btn active" onclick="setSource(0, this)">مترجم (SUB)</button>
    <button class="source-btn" onclick="setSource(1, this)">مدبلج (DUB)</button>
  </div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<nav id="bottom-nav">
  <button class="nav-btn active" onclick="showScreen('home-screen', this)" id="nav-home">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    الرئيسية
  </button>
  <button class="nav-btn" onclick="showScreen('search-screen', this); focusSearch()" id="nav-search">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    بحث
  </button>
  <button class="nav-btn" onclick="showScreen('favorites-screen', this); loadFavorites()" id="nav-fav">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    المفضلة
  </button>
</nav>

<script>
// ===== STATE =====
let currentAnime = null;
let favorites = JSON.parse(localStorage.getItem('aniwatch_favs') || '[]');
let watched = JSON.parse(localStorage.getItem('aniwatch_watched') || '{}');
let previousScreen = 'home-screen';
let searchTimeout = null;

// رابط الـ Backend الخاص بالبحث وجلب embed (Vercel)
// ⚠️ يجب تحديث هذا الرابط بعد نشر المشروع على Vercel
const HALA_API = 'https://halao.vercel.app/api/embed';

const PROVIDER_NAMES = ['مترجم (SUB)', 'مدبلج (DUB)'];
let currentSource = 0; // 0 = sub, 1 = dub
let currentEp = 1;
let lastEmbedResult = null; // آخر نتيجة من الـ API (للتبديل بين SUB/DUB بدون إعادة بحث)

async function getStreamUrl(malId, title, ep) {
  currentEp = ep || 1;
  const wrap = document.getElementById('player-frame-wrap');

  wrap.innerHTML = `
    <div id="player-loading" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:2;gap:14px">
      <div style="width:48px;height:48px;border:3px solid rgba(201,168,76,0.2);border-top-color:#c9a84c;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <p style="font-family:Tajawal;font-size:14px;color:#c9a84c">جاري البحث عن مصدر التشغيل...</p>
    </div>`;

  try {
    const url = `${HALA_API}?mal_id=${encodeURIComponent(malId)}&title=${encodeURIComponent(title)}&episode=${encodeURIComponent(currentEp)}`;
    const r = await fetch(url);
    const data = await r.json();
    lastEmbedResult = data;

    if (!data.found) {
      showPlayerError(encodeURIComponent(title), data.message || 'هذا الأنمي غير متوفر حالياً');
      return;
    }

    renderEmbed(data, title);

  } catch (e) {
    showPlayerError(encodeURIComponent(title), 'تعذّر الاتصال بالخادم، حاول مرة أخرى');
  }
}

function renderEmbed(data, title) {
  const wrap = document.getElementById('player-frame-wrap');
  const lang = currentSource === 1 ? 'dub' : 'sub';
  let embedUrl = data.embed?.[lang] || data.embed?.sub || data.embed?.dub;

  if (!embedUrl) {
    showPlayerError(encodeURIComponent(title), 'لا يوجد رابط تشغيل لهذه اللغة');
    return;
  }

  // ملاحظة للمستخدم إن كانت الحلقة المعروضة مختلفة عن المطلوبة
  let noteHtml = '';
  if (data.matched_episode && Number(data.matched_episode) !== Number(currentEp)) {
    noteHtml = `<div style="position:absolute;top:8px;right:8px;left:8px;z-index:3;background:rgba(201,168,76,0.95);color:#000;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;text-align:center">
      ⚠️ تم عرض الحلقة ${data.matched_episode} (المطلوبة غير متوفرة)
    </div>`;
  }

  wrap.innerHTML = `
    ${noteHtml}
    <div id="player-loading" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:2;gap:14px;pointer-events:none">
      <div style="width:48px;height:48px;border:3px solid rgba(201,168,76,0.2);border-top-color:#c9a84c;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <p style="font-family:Tajawal;font-size:14px;color:#c9a84c">جاري التحميل...</p>
    </div>
    <iframe
      src="${embedUrl}"
      style="position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;z-index:1"
      allowfullscreen
      allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
      onload="document.getElementById('player-loading')?.remove()"
    ></iframe>`;
}

function showPlayerError(encodedTitle, customMessage) {
  const title = decodeURIComponent(encodedTitle);
  const message = customMessage || 'تعذّر تحميل المصدر';
  document.getElementById('player-frame-wrap').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:24px;text-align:center;font-family:Tajawal;position:absolute;inset:0;">
      <div style="font-size:48px">😔</div>
      <p style="font-size:16px;font-weight:700;color:#f0c96e">${message}</p>
      <p style="font-size:13px;color:#a89060">${title}</p>
      <a href="https://anikototv.to/search?keyword=${encodeURIComponent(title)}" target="_blank"
        style="padding:12px 24px;background:linear-gradient(135deg,#f0c96e,#8b6420);color:#000;border-radius:12px;font-weight:700;font-size:15px;text-decoration:none;margin-top:4px">
        🔗 بحث في المتصفح
      </a>
    </div>`;
}

// ===== NAVIGATION =====
function showScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('bottom-nav').style.display = 'flex';
}

function goToSearch() {
  showScreen('search-screen', document.getElementById('nav-search'));
  setTimeout(() => document.getElementById('main-search').focus(), 100);
}

function goHome() {
  showScreen('home-screen', document.getElementById('nav-home'));
}

function focusSearch() {
  setTimeout(() => document.getElementById('main-search').focus(), 200);
}

function openDetail(anime) {
  currentAnime = anime;
  previousScreen = document.querySelector('.screen.active:not(#player-screen)')?.id || 'home-screen';
  const title = anime.title_english || anime.title || '';
  document.getElementById('player-anime-title').textContent = anime.title || title;
  document.getElementById('player-ep-label').textContent = 'الحلقة 1';
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('player-screen').classList.add('active');
  getStreamUrl(anime.mal_id, title, 1);
}

function goBack() {
  showScreen(previousScreen, document.getElementById(
    previousScreen === 'home-screen' ? 'nav-home' :
    previousScreen === 'search-screen' ? 'nav-search' : 'nav-fav'
  ));
}

function translateStatus(s) {
  const map = { 'Currently Airing': 'يُعرض الآن', 'Finished Airing': 'مكتمل', 'Not yet aired': 'قريباً' };
  return map[s] || s;
}

// ===== PLAYER =====
function openPlayer() {
  if (!currentAnime) return;
  const title = currentAnime.title_english || currentAnime.title || '';
  document.getElementById('player-anime-title').textContent = currentAnime.title || title;
  document.getElementById('player-ep-label').textContent = 'جاري التحميل...';
  document.getElementById('bottom-nav').style.display = 'none';
  showScreen('player-screen', null);
  getStreamUrl(currentAnime.mal_id, title, 1);
}

function watchEpisode(ep) {
  if (!currentAnime) return;
  const title = currentAnime.title_english || currentAnime.title || '';
  const key = `anime_${currentAnime.mal_id}`;
  if (!watched[key]) watched[key] = [];
  if (!watched[key].includes(ep)) watched[key].push(ep);
  localStorage.setItem('aniwatch_watched', JSON.stringify(watched));
  document.getElementById('player-anime-title').textContent = currentAnime.title || title;
  document.getElementById('player-ep-label').textContent = `الحلقة ${ep}`;
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('player-screen').classList.add('active');
  getStreamUrl(currentAnime.mal_id, title, ep);
}

function closePlayer() {
  const wrap = document.getElementById('player-frame-wrap');
  wrap.innerHTML = '';
  document.getElementById('player-screen').classList.remove('active');
  document.getElementById('bottom-nav').style.display = 'flex';
  const prevId = previousScreen;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(prevId).classList.add('active');
  const navId = prevId === 'home-screen' ? 'nav-home' : prevId === 'search-screen' ? 'nav-search' : 'nav-fav';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(navId).classList.add('active');
}

function setSource(idx, btn) {
  currentSource = idx;
  document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (!currentAnime) return;
  const title = currentAnime.title_english || currentAnime.title || '';

  // إن كانت لدينا نتيجة محفوظة لنفس الحلقة، فقط بدّل اللغة بدون طلب جديد
  if (lastEmbedResult && lastEmbedResult.found) {
    renderEmbed(lastEmbedResult, title);
  } else {
    getStreamUrl(currentAnime.mal_id, title, currentEp);
  }
}

// ===== FAVORITES =====
function toggleFavorite() {
  if (!currentAnime) return;
  const idx = favorites.findIndex(f => f.mal_id === currentAnime.mal_id);
  if (idx >= 0) {
    favorites.splice(idx, 1);
    updateFavBtn(false);
  } else {
    favorites.push({
      mal_id: currentAnime.mal_id,
      title: currentAnime.title,
      title_english: currentAnime.title_english,
      images: currentAnime.images,
      score: currentAnime.score,
      episodes: currentAnime.episodes,
      status: currentAnime.status
    });
    updateFavBtn(true);
  }
  localStorage.setItem('aniwatch_favs', JSON.stringify(favorites));
}

function updateFavBtn(isFav) {
  // محذوف مع صفحة التفاصيل
}

function loadFavorites() {
  const container = document.getElementById('favorites-list');
  if (favorites.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg width="60" height="60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      <p>لا يوجد أنمي في المفضلة بعد</p>
    </div>`;
    return;
  }
  container.innerHTML = '<div class="cards-grid">' + favorites.map(a => `
    <div class="anime-card-grid" onclick='fetchAndOpen(${a.mal_id})'>
      <img src="${a.images?.jpg?.large_image_url || ''}" alt="${a.title}" loading="lazy">
      <div class="anime-card-grid-title">${a.title || ''}</div>
    </div>
  `).join('') + '</div>';
}

// ===== API =====
async function fetchAndOpen(malId) {
  try {
    const r = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
    const d = await r.json();
    openDetail(d.data);
  } catch (e) {
    alert('خطأ في تحميل البيانات');
  }
}

async function loadTrending() {
  try {
    const r = await fetch('https://api.jikan.moe/v4/top/anime?type=tv&limit=10');
    const d = await r.json();
    renderCards('trending-cards', d.data);
    // Featured
    if (d.data.length > 0) {
      const f = d.data[0];
      document.getElementById('featured-img').src = f.images?.jpg?.large_image_url || '';
      document.getElementById('featured-title').textContent = f.title || '';
      document.getElementById('featured-meta').textContent = `⭐ ${f.score || 'N/A'} • ${f.episodes || '?'} حلقة`;
      document.getElementById('featured-banner').onclick = () => openDetail(f);
    }
  } catch (e) { document.getElementById('trending-cards').innerHTML = '<p style="padding:16px;color:var(--text2)">خطأ في التحميل</p>'; }
}

async function loadAiring() {
  try {
    const r = await fetch('https://api.jikan.moe/v4/seasons/now?limit=10');
    const d = await r.json();
    renderCards('airing-cards', d.data);
  } catch (e) {}
}

async function loadTopRated() {
  try {
    const r = await fetch('https://api.jikan.moe/v4/top/anime?filter=bypopularity&limit=10');
    const d = await r.json();
    renderCards('toprated-cards', d.data);
  } catch (e) {}
}

function renderCards(containerId, animes) {
  const container = document.getElementById(containerId);
  if (!animes || animes.length === 0) { container.innerHTML = '<p style="padding:16px;color:var(--text2)">لا توجد نتائج</p>'; return; }
  container.innerHTML = animes.map(a => `
    <div class="anime-card" onclick='openDetail(${JSON.stringify(a).replace(/'/g, "&#39;")})'>
      <img src="${a.images?.jpg?.large_image_url || ''}" alt="${a.title}" loading="lazy">
      <div class="anime-card-title">${a.title || ''}</div>
      ${a.score ? `<div class="anime-card-score">⭐ ${a.score}</div>` : ''}
    </div>
  `).join('');
}

function searchAnime(q) {
  clearTimeout(searchTimeout);
  if (!q || q.length < 2) {
    document.getElementById('search-results').innerHTML = `<div style="text-align:center;color:var(--text2);padding:40px 16px"><div style="font-size:40px;margin-bottom:12px">🔍</div><p>ابحث عن أنمي تريده</p></div>`;
    return;
  }
  document.getElementById('search-results').innerHTML = `<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  searchTimeout = setTimeout(async () => {
    try {
      const r = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=20`);
      const d = await r.json();
      if (!d.data || d.data.length === 0) {
        document.getElementById('search-results').innerHTML = `<div style="text-align:center;color:var(--text2);padding:40px"><p>لا توجد نتائج لـ "${q}"</p></div>`;
        return;
      }
      document.getElementById('search-results').innerHTML = d.data.map(a => `
        <div class="search-result-item" onclick='openDetail(${JSON.stringify(a).replace(/'/g, "&#39;")})'>
          <img src="${a.images?.jpg?.image_url || ''}" alt="${a.title}" loading="lazy">
          <div class="search-result-info">
            <div class="search-result-title">${a.title || ''}</div>
            <div class="search-result-meta">
              ${a.type || ''} ${a.episodes ? '• ' + a.episodes + ' حلقة' : ''}<br>
              ${a.score ? '⭐ ' + a.score : ''} ${a.status ? '• ' + translateStatus(a.status) : ''}
            </div>
          </div>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('search-results').innerHTML = '<p style="padding:16px;color:var(--text2)">خطأ في البحث، حاول مرة أخرى</p>';
    }
  }, 600);
}

function onHomeSearch(v) {
  if (v.length > 0) goToSearch();
}

// ===== INIT =====
loadTrending();
setTimeout(loadAiring, 500);
setTimeout(loadTopRated, 1000);
</script>
</body>
</html>
